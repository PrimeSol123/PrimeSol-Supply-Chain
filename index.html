<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>臻方供应链管理系统</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #165DFF; z-index: 99999; display: flex; align-items: center; justify-content: center; }
        .login-box { background: white; padding: 40px; border-radius: 12px; max-width: 400px; width: 100%; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        .login-box h2 { text-align: center; margin-bottom: 24px; color: #165DFF; }
        .login-input { width: 100%; padding: 12px 16px; margin-bottom: 16px; border: 1px solid #ddd; border-radius: 6px; font-size: 16px; }
        .login-btn { width: 100%; padding: 12px; background: #165DFF; color: white; border: none; border-radius: 6px; font-size: 16px; cursor:pointer; }
        .error { color: red; text-align: center; margin-bottom: 12px; display: none; }
        .modal-overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:999; align-items:center; justify-content:center; }
        .modal { background:white; width:90%; max-width:1000px; border-radius:12px; max-height:90vh; overflow:auto; }
        .modal-header { padding:16px 20px; border-bottom:1px solid #eee; display:flex; justify-content:space-between; align-items:center; }
        .modal-close { background:none; border:none; font-size:24px; cursor:pointer; }
        .modal-body { padding:20px; }
        .modal-footer { padding:16px 20px; border-top:1px solid #eee; display:flex; justify-content:flex-end; gap:10px; }
        .form-grid { display:grid; grid-template-columns:1fr 1fr 1fr; gap:12px; }
        .form-group { margin-bottom:12px; }
        .form-label { display:block; margin-bottom:6px; font-size:14px; color:#333; }
        .form-control { width:100%; padding:10px; border:1px solid #ddd; border-radius:6px; box-sizing:border-box; }
        .btn { padding:10px 16px; border-radius:6px; cursor:pointer; border:none; }
        .btn-primary { background:#165DFF; color:white; }
        .btn-outline { border:1px solid #ddd; background:white; }
        .section-bar { margin:16px 0 8px; font-weight:bold; color:#165DFF; }
        .item-row { display:flex; gap:10px; padding:8px; background:#f7f8fa; border-radius:6px; margin:4px 0; }
        .item-row button { background:none; border:none; color:red; cursor:pointer; }
        #mainContainer { display:none; }
        .header { display:flex; justify-content:space-between; padding:16px 20px; background:white; box-shadow:0 2px 4px #00000010; }
        .filter-section { display:flex; gap:10px; padding:16px 20px; flex-wrap:wrap; }
        .table-container { padding:20px; }
        .table-header { display:flex; justify-content:space-between; margin-bottom:12px; }
        table { width:100%; border-collapse:collapse; }
        th,td { padding:10px; border:1px solid #eee; text-align:center; font-size:14px; }
        th { background:#f7f8fa; }
        .detail-btn { color:#165DFF; cursor:pointer; }
        .action-buttons { display:flex; gap:6px; justify-content:center; }
        .action-btn { padding:4px 8px; font-size:12px; cursor:pointer; border:none; border-radius:4px; }
    </style>
</head>
<body>

<div class="login-overlay" id="loginOverlay">
    <div class="login-box">
        <h2>臻方供应链管理系统</h2>
        <div class="error" id="errorTip">密码错误</div>
        <input type="password" id="passwordInput" class="login-input" placeholder="输入密码">
        <button class="login-btn" onclick="checkPassword()">登录</button>
    </div>
</div>

<div id="mainContainer">
    <div class="header">
        <h2>臻方供应链管理系统</h2>
    </div>

    <div class="filter-section">
        <button class="btn btn-outline" id="export-btn">导出</button>
        <button class="btn btn-primary" id="add-btn">添加订单</button>
    </div>

    <div class="table-container">
        <div class="table-header">
            <h3>订单列表</h3>
            <span id="record-count">(共0条)</span>
        </div>
        <table>
            <thead>
                <tr>
                    <th>序号</th>
                    <th>客户</th>
                    <th>单号</th>
                    <th>国家</th>
                    <th>收货人</th>
                    <th>应付</th>
                    <th>利润</th>
                    <th>轨迹</th>
                    <th>状态</th>
                    <th>操作</th>
                </tr>
            </thead>
            <tbody id="order-tbody"></tbody>
        </table>
    </div>
</div>

<div class="modal-overlay" id="order-modal">
    <div class="modal">
        <div class="modal-header">
            <h3 id="modal-title">添加订单</h3>
            <button class="modal-close" id="modal-close">&times;</button>
        </div>
        <div class="modal-body">
            <form id="order-form">
                <div class="form-grid">
                    <div class="form-group">
                        <label class="form-label">客户名称</label>
                        <input class="form-control" id="form-customer">
                    </div>
                    <div class="form-group">
                        <label class="form-label">客户单号</label>
                        <input class="form-control" id="form-order-id">
                    </div>
                    <div class="form-group">
                        <label class="form-label">入仓日期</label>
                        <input type="date" class="form-control" id="form-warehouse-in">
                    </div>
                    <div class="form-group">
                        <label class="form-label">商品名称</label>
                        <input class="form-control" id="form-product-name">
                    </div>
                    <div class="form-group">
                        <label class="form-label">货品件数</label>
                        <input type="number" class="form-control" id="form-quantity">
                    </div>
                    <div class="form-group">
                        <label class="form-label">重量</label>
                        <input class="form-control" id="form-weight">
                    </div>
                    <div class="form-group">
                        <label class="form-label">国家</label>
                        <input class="form-control" id="form-country">
                    </div>
                    <div class="form-group">
                        <label class="form-label">收货人信息</label>
                        <input class="form-control" id="form-receiver">
                    </div>
                    <div class="form-group">
                        <label class="form-label">运输方式</label>
                        <select class="form-control" id="form-transport">
                            <option>快递</option><option>空派</option><option>海运</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label">应付金额</label>
                        <input type="number" class="form-control" id="form-payable">
                    </div>
                    <div class="form-group">
                        <label class="form-label">客户付款</label>
                        <input type="number" class="form-control" id="form-customer-pay">
                    </div>
                    <div class="form-group">
                        <label class="form-label">利润</label>
                        <input class="form-control" id="form-profit" readonly>
                    </div>
                    <div class="form-group">
                        <label class="form-label">转单号</label>
                        <input class="form-control" id="form-tracking-no">
                    </div>
                    <div class="form-group">
                        <label class="form-label">状态</label>
                        <select class="form-control" id="form-status">
                            <option>待发货</option><option>已发货</option><option>已签收</option>
                        </select>
                    </div>
                </div>

                <div class="section-bar">应付子项</div>
                <button type="button" id="add-pay-item" class="btn btn-outline">+ 添加应付子项</button>
                <div id="pay-items-container" style="margin-top:8px;"></div>

                <div class="section-bar">物流轨迹</div>
                <button type="button" id="add-tracking-record" class="btn btn-outline">+ 添加轨迹记录</button>
                <div id="tracking-records-container" style="margin-top:8px;"></div>
            </form>
        </div>
        <div class="modal-footer">
            <button class="btn btn-outline" id="modal-cancel">取消</button>
            <button class="btn btn-primary" id="modal-save">保存</button>
        </div>
    </div>
</div>

<script>
const CORRECT_PASSWORD = "123456";
function checkPassword() {
    let v = document.getElementById("passwordInput").value;
    if (v === CORRECT_PASSWORD) {
        document.getElementById("loginOverlay").remove();
        document.getElementById("mainContainer").style.display = "block";
    } else {
        document.getElementById("errorTip").style.display = "block";
    }
}
document.getElementById("passwordInput").addEventListener("keydown", e => {
    if (e.key === "Enter") checkPassword();
});
</script>
<script src="JavaScript.js"></script>
</body>
</html>
